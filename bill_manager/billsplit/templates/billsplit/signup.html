{% extends 'base.html' %}
{% block title %}Sign up • Splitly{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md w-full bg-zinc-900 rounded-3xl p-10 shadow-2xl">
    <div class="flex justify-center mb-8">
      <i class="fas fa-handshake text-6xl text-violet-500"></i>
    </div>
    <h1 class="text-4xl font-bold text-center mb-2">Create your account</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" 
              class="w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl font-semibold text-lg transition mt-4">
        Create Account
      </button>
    </form>
  </div>
</div>
{% endblock %}
