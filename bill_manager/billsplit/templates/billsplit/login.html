{% extends 'base.html' %}
{% block title %}Log in • Splitly{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md w-full bg-zinc-900 rounded-3xl p-10 shadow-2xl">
    <h1 class="text-4xl font-bold text-center mb-8">Welcome back</h1>
    <form method="post">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" 
             class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-4 focus:outline-none focus:border-violet-500">
      <input type="password" name="password" placeholder="Password" 
             class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-6 focus:outline-none focus:border-violet-500">
      <button type="submit" 
              class="w-full bg-white text-black py-4 rounded-2xl font-semibold text-lg hover:bg-violet-500 hover:text-white transition">
        Log in
      </button>
    </form>
    <p class="text-center mt-8 text-sm text-zinc-400">
      Demo: yogesh / pass (or create new account)
    </p>
    <p class="text-center mt-4 text-sm text-violet-400">
      New here? <a href="{% url 'signup' %}" class="underline">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
